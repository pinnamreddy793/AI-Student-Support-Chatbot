#AI Student Support Chatbot
#login.html display the login screen for the user


<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | AI Student Support Chatbot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>AI Student Support Chatbot</h1>

        <p class="subtitle">
            Higher Education Student Support System
        </p>

        {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="demo-login">

            <strong>Demo Login</strong>

            <p>Username: student</p>

            <p>Password: password123</p>

        </div>

    </div>

</div>

</body>

</html>
