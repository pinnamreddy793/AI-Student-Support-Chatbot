
<!DOCTYPE html>
<html>

<head>

    <title>AI Student Support Chatbot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>AI Student Support Chatbot</h1>

<form method="POST">

<input
type="text"
name="message"
placeholder="Ask your question..."
required>

<button type="submit">

Ask

</button>

</form>

{% if response %}

<div class="response">

<h3>Chatbot Response</h3>

<p>{{ response }}</p>

</div>

{% endif %}

</div>

</body>

</html>
